# The Site Configuration
theme: jekyll-theme-chirpy

lang: en
timezone: Europe/London

# jekyll-seo-tag settings
title: "Everything is fine."
tagline: "On building software and other things."

description: >-
  On building software and other things. A blog by Ari.

url: "https://ariapar.github.io"

github:
  username: ariapar

twitter:
  username: hayd_ari

social:
  name: Ari
  email: isemailfine@gmail.com
  links:
    - https://twitter.com/hayd_ari
    - https://github.com/ariapar
    - https://www.linkedin.com/in/ariapar

theme_mode:

avatar: /assets/img/avatar.jpg

toc: true

comments:
  provider:

paginate: 10

baseurl: ""

# ------------ Do not modify below ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
