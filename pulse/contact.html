<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Pulse</title>
  <meta name="description" content="Get in touch with the Pulse team for support or feedback.">
  <meta name="author" content="Ari Aparikyan">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#fafaf8">

  <link rel="icon" href="icon-small.png">
  <link rel="apple-touch-icon" href="icon-small.png">
  <link rel="canonical" href="https://pulsehabit.app/contact.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <style>
    :root {
      --teal: #5bb8a6;
      --teal-deep: #3d9e8b;
      --teal-light: #e8f5f2;
      --ink: #1a1a1a;
      --ink-soft: #4a4a4a;
      --ink-muted: #8a8a8a;
      --bone: #fafaf8;
      --rule: #e5e3df;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bone);
      color: var(--ink);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* --- NAV --- */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 18px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(250, 250, 248, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--ink);
    }

    .nav-brand img { width: 32px; height: 32px; border-radius: 8px; }
    .nav-brand span { font-weight: 600; font-size: 17px; letter-spacing: -0.02em; }

    .nav-links { display: flex; gap: 32px; align-items: center; }

    .nav-links a {
      text-decoration: none;
      color: var(--ink-soft);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--ink); }

    .nav-cta {
      background: var(--ink) !important;
      color: var(--bone) !important;
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 14px !important;
      transition: opacity 0.2s !important;
    }

    .nav-cta:hover { opacity: 0.85; }

    /* --- CONTACT --- */
    .contact {
      padding: 160px 24px 120px;
      max-width: 560px;
      margin: 0 auto;
      text-align: center;
      animation: fadeUp 0.8s ease both;
    }

    .contact h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(40px, 6vw, 60px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
    }

    .contact p {
      font-size: 17px;
      color: var(--ink-soft);
      line-height: 1.65;
      margin-bottom: 36px;
    }

    .contact-email {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 14px;
      padding: 18px 28px;
      text-decoration: none;
      color: var(--teal-deep);
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.01em;
      transition: all 0.25s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .contact-email:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      border-color: var(--teal);
    }

    .contact-email svg {
      width: 20px;
      height: 20px;
      color: var(--teal);
      flex-shrink: 0;
    }

    /* --- FOOTER --- */
    footer {
      padding: 40px 32px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 800px;
      margin: 0 auto;
    }

    .footer-left { font-size: 13px; color: var(--ink-muted); }

    .footer-links { display: flex; gap: 24px; }

    .footer-links a {
      font-size: 13px;
      color: var(--ink-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--ink); }

    /* --- ANIMATIONS --- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .nav-links { display: none; }
      .contact { padding: 120px 20px 80px; }

      footer {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="./" class="nav-brand">
      <img src="icon-small.png" alt="Pulse app icon" width="32" height="32">
      <span>Pulse</span>
    </a>
    <div class="nav-links">
      <a href="./">Home</a>
      <a href="./#features">Features</a>
      <a href="https://apps.apple.com/app/id6758529531" class="nav-cta">Download</a>
    </div>
  </nav>

  <!-- CONTACT -->
  <section class="contact">
    <h1>Get in touch</h1>
    <p>Have a question, found a bug, or just want to share feedback? Send an email and I'll get back to you.</p>
    <a href="mailto:isemailfine@gmail.com" class="contact-email">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
      isemailfine@gmail.com
    </a>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-left">&copy; 2026 Pulse</div>
    <div class="footer-links">
      <a href="./">Home</a>
      <a href="privacy.html">Privacy</a>
      <a href="https://apps.apple.com/app/id6758529531">App Store</a>
    </div>
  </footer>

</body>
</html>
